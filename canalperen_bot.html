"<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Can Alperen Asistan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0d0d0f;color:#f0efe8;height:100dvh;display:flex;flex-direction:column;align-items:center}
header{width:100%;max-width:760px;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a2a2e;background:#161618}
header img{width:42px;height:42px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid #4f8ef7}
.hinfo h1{font-size:14px;font-weight:600}
.hinfo p{font-size:11px;color:#7a7a80;display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.badge{margin-left:auto;font-size:11px;color:#4f8ef7;border:1px solid #4f8ef7;border-radius:99px;padding:2px 10px}
#msgs{flex:1;width:100%;max-width:760px;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.wcard{background:#161618;border:1px solid #2a2a2e;border-radius:12px;padding:20px}
.wtop{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.wtop img{width:50px;height:50px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid #4f8ef7}
.wtop h2{font-size:16px;font-weight:600}
.wtop span{font-size:12px;color:#7a7a80}
.wcard p{font-size:13px;color:#7a7a80;line-height:1.6;margin-bottom:14px}
.qbtns{display:flex;flex-wrap:wrap;gap:6px}
.qbtn{font-size:12px;padding:5px 12px;border:1px solid #333338;border-radius:99px;background:#1e1e21;color:#f0efe8;cursor:pointer}
.qbtn:hover{border-color:#4f8ef7;color:#4f8ef7}
.row{display:flex;gap:8px;max-width:82%;animation:fu .2s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.row.me{align-self:flex-end;flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;margin-top:2px;border:1.5px solid #4f8ef7}
.av img{width:100%;height:100%;object-fit:cover;object-position:top}
.av.u{background:#1e1e21;border-color:#333338;display:flex;align-items:center;justify-content:center;font-size:10px;color:#7a7a80}
.bub{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.65;word-break:break-word;white-space:pre-wrap}
.row.bot .bub{background:#161618;border:1px solid #2a2a2e;border-radius:2px 12px 12px 12px;color:#f0efe8}
.row.me .bub{background:#1d3461;border:1px solid #2a4a80;border-radius:12px 2px 12px 12px;color:#c8d9f8}
.typing{display:flex;gap:4px;padding:10px 14px;background:#161618;border:1px solid #2a2a2e;border-radius:2px 12px 12px 12px}
.typing span{width:6px;height:6px;border-radius:50%;background:#4f8ef7;animation:p 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes p{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.foot{width:100%;max-width:760px;padding:0 20px 16px}
.irow{display:flex;gap:8px;align-items:flex-end;background:#161618;border:1px solid #333338;border-radius:12px;padding:8px 8px 8px 14px}
.irow:focus-within{border-color:#4f8ef7}
textarea{flex:1;border:none;background:transparent;outline:none;font-family:inherit;font-size:13px;color:#f0efe8;resize:none;min-height:20px;max-height:120px;line-height:1.5}
textarea::placeholder{color:#45454c}
button#sb{width:34px;height:34px;border-radius:50%;background:#2563eb;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
button#sb:hover{background:#4f8ef7}
button#sb:disabled{opacity:.3;cursor:default}
button#sb svg{width:15px;height:15px;fill:#fff}
.hint{font-size:10px;color:#45454c;text-align:center;margin-top:6px}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:#333338;border-radius:2px}
</style>
</head>
